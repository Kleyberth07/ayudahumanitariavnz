<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Asistencia Humanitaria</title>
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://pl30142759.effectivecpmnetwork.com/13/82/c6/1382c63d38543705bcccb68b8d5a9ee5.js"></script>
</head>
<body>
    <header class="ong-header">
        <h1>Asistencia Humanitaria</h1>
        <p>Portal de Registro y Asignación</p>
    </header>

    <main class="dashboard-container">
        <div id="modulo-confirmar"></div>
        <div id="modulo-espera" style="display: none;"></div>
        <div id="modulo-pago" style="display: none;"></div>
        
        <div id="modulo-final" style="display:none; padding: 20px; text-align: center;">
            <h2>✅ Registro Exitoso</h2>
            <p>Tu información ha sido recibida. En las próximas 24 horas se realizará la asignación de la ayuda humanitaria.</p>
            <hr>
            <h3>Reportes y Actualidad</h3>
            <div id="contenedor-noticias"></div>
        </div>
    </main>

    <script>
        // Función para inyectar componentes HTML
        async function cargarModulo(idContenedor, rutaHtml, rutaCss, rutaJs) {
            try {
                // Inyectar HTML
                const respuesta = await fetch(rutaHtml);
                const html = await respuesta.text();
                document.getElementById(idContenedor).innerHTML = html;

                // Inyectar CSS dinámico
                if (rutaCss) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = rutaCss;
                    document.head.appendChild(link);
                }

                // Inyectar JS dinámico
                if (rutaJs) {
                    const script = document.createElement('script');
                    script.src = rutaJs;
                    script.defer = true;
                    document.body.appendChild(script);
                }
            } catch (error) {
                console.error(`Error cargando el módulo ${rutaHtml}:`, error);
            }
        }

        // Función base para evitar errores al ser llamada desde confirmar.js
        // Aquí conectaremos la tabla de Supabase en el futuro
        async function cargarNoticias() {
            const contenedor = document.getElementById('contenedor-noticias');
            if (contenedor) {
                contenedor.innerHTML = '<p style="color: #64748B;">Cargando reportes actualizados de Venezuela...</p>';
            }
        }

        // Inicializar Dashboard cargando el primer módulo
        window.onload = () => {
            cargarModulo(
                'modulo-confirmar', 
                'boton_confirmar/confirmar.html', 
                'boton_confirmar/confirmar.css', 
                'boton_confirmar/confirmar.js'
            );
            
            // Pre-cargamos el módulo de espera (oculto por defecto)
            cargarModulo(
                'modulo-espera', 
                'estado_espera/espera.html', 
                'estado_espera/espera.css', 
                null
            );
        };
    </script>
</body>
</html>
